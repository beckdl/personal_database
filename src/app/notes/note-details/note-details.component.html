<div class="panel panel-default">
  <div class="panel-heading">
    <div class="row pad-all">
      <h4 class="title margin-left-right">{{note.subject}}</h4>
      <div class="row pull-right margin-left-right">
        <a [routerLink]="['edit']" class="btn btn-info">Edit</a>
        <a class="btn btn-danger" (click)="onDelete()">Delete</a>
      </div>
    </div>
  </div>
  <div class="panel-body">
    <div class="pad-left-right">
      <div class="row">
        <label>Note:</label>
        <span class="label-value">{{note.note}}</span>
      </div>
    </div>
  </div>
</div>
